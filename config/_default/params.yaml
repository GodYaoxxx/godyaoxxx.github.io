# 主题配色 - minimal 最接近 MetaConscious 的极简风
theme: minimal
color: light

# 关闭暗色模式切换
day_night: false

# 关闭搜索框
search:
  provider: ''

# 网站描述（SEO）
description: '你的实验室研究方向简介'

# 作者/实验室名称
author:
  name: '实验室名称'

# 社交链接（只保留邮箱，需要其他的自己加）
social:
  - icon: envelope
    icon_pack: fas
    link: 'mailto:your-email@example.com'
  # - icon: github
  #   icon_pack: fab
  #   link: https://github.com/
  # - icon: google-scholar
  #   icon_pack: ai
  #   link: https://scholar.google.com/

# 显示语言切换按钮
i18n:
  enable: true

# 评论系统（关闭）
comments:
  provider: ''

# 地图（联系页面用，可选）
map:
  provider: ''
  api_key: ''

# 在 params.yaml 最后添加：
last_name_first: true
