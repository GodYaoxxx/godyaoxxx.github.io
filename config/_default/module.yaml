imports:
  # 核心模块
  - path: github.com/HugoBlox/kit/modules/blox
  
  # 博客模块（用于新闻 News）
  - path: github.com/HugoBlox/kit/modules/blog
  
  # 幻灯片模块（教学用，可选）
  - path: github.com/HugoBlox/kit/modules/slides
  
  # SEO 优化（可选）
  - path: github.com/HugoBlox/kit/modules/seo

# 本地自定义模块
mounts:
  - source: hugo-blox/blox
    target: layouts/_partials/blox/
    files:
      - '**.html'
  - source: layouts
    target: layouts
  - source: assets
    target: assets
